<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>GrokThink</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <div id="topbar-menus"></div>
</div>

<div id="main">

  <div id="canvas-wrap">
    <svg id="wires"></svg>
    <div id="canvas"></div>
  </div>

</div>

<!-- connection state is the whole screen, not a word in a corner: while
     the session is not live the canvas is greyed out and unclickable, so
     nothing can be fiddled with against a server that isn't there -->
<div id="offline"><span id="offline-msg">disconnected</span></div>

<script src="app.js"></script>
</body>
</html>
